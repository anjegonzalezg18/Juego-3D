<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JUEGO SENATIC - LEVEL 1</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      background: #000;
      overflow: hidden;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #0a1a2e 0%, #000 100%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #00ffcc;
      text-align: center;
      border: 8px double #00ffcc;
      box-sizing: border-box;
    }

    .terminal-box {
      background: rgba(0, 20, 40, 0.95);
      padding: 40px;
      border: 2px solid #00ffcc;
      box-shadow: 0 0 40px #00ffcc;
      border-radius: 18px;
      max-width: 90vw;
    }

    input {
      background: #000;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      padding: 14px;
      font-size: 20px;
      font-family: inherit;
      text-align: center;
      width: min(320px, 80vw);
      margin-top: 20px;
      outline: none;
      text-transform: uppercase;
    }

    .btn-systec {
      margin-top: 26px;
      padding: 14px 40px;
      background: #00ffcc;
      color: #000;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px;
      clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
      transition: 0.3s;
    }

    .btn-systec:hover {
      transform: scale(1.03);
    }

    #ui-top {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(0, 10, 20, 0.85);
      color: #00ffcc;
      padding: 16px;
      border: 2px solid #00ffcc;
      border-radius: 10px;
      display: none;
      min-width: 170px;
    }

    .controles-movil {
      position: absolute;
      bottom: 20px;
      width: 100%;
      display: none;
      justify-content: space-between;
      padding: 0 30px;
      box-sizing: border-box;
      z-index: 1000;
      pointer-events: none;
    }

    .d-pad {
      display: grid;
      grid-template-columns: repeat(3, 55px);
      gap: 5px;
      pointer-events: auto;
    }

    .d-btn, .btn-salto {
      width: 55px;
      height: 55px;
      background: rgba(0, 255, 204, 0.2);
      border: 2px solid #00ffcc;
      color: #00ffcc;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-weight: bold;
      user-select: none;
      -webkit-user-select: none;
    }

    .btn-salto {
      width: 100px;
      height: 80px;
      font-size: 14px;
      pointer-events: auto;
    }

    .hint {
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.85;
      line-height: 1.4;
    }
  </style>

  <script>
    let nombrePiloto = "";
    let juegoIniciado = false;

    function iniciarMision() {
      const input = document.querySelector('#input-nombre');

      if (input.value.trim() === "") {
        alert("IDENTIFICACIÓN REQUERIDA");
        return;
      }

      nombrePiloto = input.value.toUpperCase();
      localStorage.setItem('nombrePiloto', nombrePiloto);
      document.querySelector('#user-display').innerText = nombrePiloto;

      document.querySelector('#pantalla-registro').style.display = "none";
      document.querySelector('#ui-top').style.display = "block";

      if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        document.querySelector('.controles-movil').style.display = "flex";
      }

      setTimeout(() => {
        juegoIniciado = true;
      }, 200);
    }

    function irAlIndex() {
      localStorage.removeItem('puntajeAcumulado');
      window.location.href = "index.html";
    }

    AFRAME.registerComponent('motor-gameplay', {
      init: function () {
        const puntajeGuardado = localStorage.getItem('puntajeAcumulado');
        this.puntos = puntajeGuardado ? parseInt(puntajeGuardado) : 0;
        this.vidas = 3;
        this.posicionInicial = { x: 0, y: 3, z: 0 };
        this.puedeSaltar = true;
        this.invulnerable = false;
        this.keys = {};

        this.actualizarUI();

        window.addEventListener('keydown', (e) => { this.keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { this.keys[e.code] = false; });

        const bindTouch = (id, code) => {
          const el = document.querySelector(id);
          if (!el) return;

          el.addEventListener('touchstart', (e) => {
            e.preventDefault();
            this.keys[code] = true;
          }, { passive: false });

          el.addEventListener('touchend', (e) => {
            e.preventDefault();
            this.keys[code] = false;
          }, { passive: false });
        };

        bindTouch('#m-up', 'KeyW');
        bindTouch('#m-down', 'KeyS');
        bindTouch('#m-left', 'KeyA');
        bindTouch('#m-right', 'KeyD');
        bindTouch('#m-jump', 'Space');

        this.el.addEventListener('collide', (e) => {
          const target = e.detail.body.el;
          if (!target || !juegoIniciado) return;

          if (target.id === 'meta') {
            this.puntos += 5000;
            localStorage.setItem('puntajeAcumulado', this.puntos);

            if (navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 500]);

            this.finalizarJuego("¡NIVEL 1 COMPLETADO!");

            setTimeout(() => {
              window.location.href = "level2.html";
            }, 1800);
          }

          if ((target.id === 'lava' || target.classList.contains('obstaculo')) && !this.invulnerable) {
            this.perderVida();
          }
        });
      },

      perderVida: function () {
        this.invulnerable = true;
        this.vidas--;
        this.actualizarUI();

        if (this.vidas <= 0) {
          if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
          localStorage.removeItem('puntajeAcumulado');
          this.finalizarJuego("GAME OVER");
        } else {
          if (navigator.vibrate) navigator.vibrate(200);
          this.el.body.position.set(this.posicionInicial.x, this.posicionInicial.y, this.posicionInicial.z);
          this.el.body.velocity.set(0, 0, 0);
          this.el.body.quaternion.set(0, 0, 0, 1);

          setTimeout(() => {
            this.invulnerable = false;
          }, 1000);
        }
      },

      actualizarUI: function () {
        const puntosVal = document.querySelector('#puntos-val');
        const vidasVal = document.querySelector('#vidas-val');

        if (puntosVal) puntosVal.innerText = this.puntos;
        if (vidasVal) vidasVal.innerText = "❤️".repeat(this.vidas > 0 ? this.vidas : 0);
      },

      finalizarJuego: function (titulo) {
        juegoIniciado = false;

        document.querySelector('#game-over-screen').style.display = "flex";
        const controles = document.querySelector('.controles-movil');
        if (controles) controles.style.display = "none";

        document.querySelector('#final-title').innerText = titulo;
        document.querySelector('#final-score').innerText = `${nombrePiloto}, PUNTUACIÓN: ${this.puntos}`;
      },

      tick: function () {
        if (!this.el.body || !juegoIniciado) return;

        if (this.el.body.position.y < -5 && !this.invulnerable) {
          this.perderVida();
          return;
        }

        this.el.body.quaternion.set(0, 0, 0, 1);
        this.el.body.angularVelocity.set(0, 0, 0);

        let v = this.el.body.velocity;
        let f = 8;

        if (this.keys['KeyW']) v.z = -f; else if (this.keys['KeyS']) v.z = f; else v.z = 0;
        if (this.keys['KeyA']) v.x = -f; else if (this.keys['KeyD']) v.x = f; else v.x = 0;

        if (this.keys['Space']) {
          if (Math.abs(v.y) < 0.1 && this.puedeSaltar) {
            v.y = 13;
            this.puedeSaltar = false;
          }
        } else {
          this.puedeSaltar = true;
        }
      }
    });

    AFRAME.registerComponent('seguimiento-camara', {
      init: function () {
        this.objetivo = document.querySelector('#jugador');
        this.keys = {};
        window.addEventListener('keydown', (e) => { this.keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { this.keys[e.code] = false; });
        this.currentRotation = { x: -20, y: 0, z: 0 };
      },

      tick: function () {
        if (!this.objetivo || !juegoIniciado) return;

        this.el.object3D.position.lerp(this.objetivo.object3D.position, 0.1);

        if (this.keys['ArrowLeft']) this.currentRotation.y += 2.0;
        if (this.keys['ArrowRight']) this.currentRotation.y -= 2.0;
        if (this.keys['ArrowUp']) this.currentRotation.x -= 1.0;
        if (this.keys['ArrowDown']) this.currentRotation.x += 1.0;

        this.currentRotation.x = Math.max(-60, Math.min(20, this.currentRotation.x));

        this.el.setAttribute(
          'rotation',
          `${this.currentRotation.x} ${this.currentRotation.y} ${this.currentRotation.z}`
        );
      }
    });
  </script>
</head>

<body>
  <div class="controles-movil">
    <div class="d-pad">
      <div></div><div id="m-up" class="d-btn">▲</div><div></div>
      <div id="m-left" class="d-btn">◀</div><div id="m-down" class="d-btn">▼</div><div id="m-right" class="d-btn">▶</div>
    </div>
    <div id="m-jump" class="btn-salto">SALTO</div>
  </div>

  <div id="pantalla-registro" class="overlay">
    <div class="terminal-box">
      <h1 style="letter-spacing: 10px; margin: 0;">SYSTEC CORE</h1>
      <p class="hint">LEVEL 1 · Fácil</p>
      <input type="text" id="input-nombre" placeholder="ID DEL PILOTO" maxlength="12" autocomplete="off" />
      <br />
      <button class="btn-systec" onclick="iniciarMision()">ESTABLECER ENLACE</button>
      <br />
      <button onclick="irAlIndex()" style="margin-top: 18px; background: rgba(0,255,204,0.1); border: 1px solid #00ffcc; color: #00ffcc; cursor: pointer; font-family: inherit; font-size: 14px; padding: 12px; width: 100%;">
        ⬅ VOLVER AL PORTAL SYSTEC
      </button>
    </div>
  </div>

  <div id="ui-top">
    LEVEL 1<br>
    ID: <span id="user-display">---</span><br>
    PTS: <span id="puntos-val">0</span><br>
    <div id="vidas-val">❤️❤️❤️</div>
  </div>

  <div id="game-over-screen" class="overlay" style="display: none;">
    <div class="terminal-box">
      <h1 id="final-title">TERMINADO</h1>
      <p id="final-score"></p>
      <button class="btn-systec" onclick="location.reload()">REINTENTAR MISIÓN</button>
      <br />
      <button class="btn-systec" onclick="irAlIndex()" style="margin-top: 14px; background: transparent; color: #00ffcc; border: 1px solid #00ffcc;">
        VOLVER AL INICIO
      </button>
    </div>
  </div>

  <a-scene physics="gravity: -18; friction: 0.01;">
    <a-assets>
      <img id="textura-cielo" src="img/ChatGPT Image 15 may 2026, 04_21_16 p.m.png">
    </a-assets>

    <a-sphere id="sky-dome" radius="150" material="src: #textura-cielo; shader: flat; side: back" rotation="0 -90 0"></a-sphere>
    <a-stars radius="120" count="4000" color="#00ffcc"></a-stars>
    <a-light type="ambient" intensity="0.45"></a-light>

    <!-- Suelo inicial -->
    <a-box class="suelo" static-body position="0 0 0" width="10" height="0.3" depth="10" color="#222"></a-box>

    <!-- Primer tramo -->
    <a-box class="suelo" static-body position="0 2.5 -8" width="6" height="0.3" depth="6" color="#333"></a-box>
    <a-box class="suelo" static-body position="5 4.5 -16" width="5" height="0.3" depth="5" color="#444"></a-box>

    <!-- Tramo medio -->
    <a-box class="suelo" static-body position="0 6.5 -24" width="6" height="0.3" depth="6" color="#555"></a-box>
    <a-box class="suelo" static-body position="4 8.5 -32" width="5" height="0.3" depth="5" color="#666"></a-box>

    <!-- Tramo final -->
    <a-box class="suelo" static-body position="0 10.5 -40" width="7" height="0.3" depth="7" color="#444"></a-box>

    <!-- Obstáculos fáciles -->
    <a-box class="obstaculo" static-body position="0 3.2 -8" width="1.2" height="1.2" depth="1.2" color="#8b2cff"></a-box>
    <a-box class="obstaculo" static-body position="-1.8 3.0 -6.8" width="0.8" height="0.8" depth="0.8" color="#00cccc"></a-box>

    <a-box class="obstaculo" static-body position="5 5.1 -16" width="1.1" height="1.1" depth="1.1" color="#8b2cff"></a-box>
    <a-box class="obstaculo" static-body position="3.4 5.0 -17.5" width="0.9" height="0.9" depth="0.9" color="#00cccc"></a-box>

    <a-box class="obstaculo" static-body position="0.8 7.1 -24" width="1.1" height="1.1" depth="1.1" color="#8b2cff"></a-box>
    <a-box class="obstaculo" static-body position="-1.5 7.0 -25.2" width="0.8" height="0.8" depth="0.8" color="#00cccc"></a-box>

    <a-box class="obstaculo" static-body position="4 9.1 -32" width="1.1" height="1.1" depth="1.1" color="#8b2cff"></a-box>
    <a-box class="obstaculo" static-body position="2.2 9.0 -33.2" width="0.8" height="0.8" depth="0.8" color="#00cccc"></a-box>

    <a-box class="obstaculo" static-body position="-0.8 11.1 -40" width="1.1" height="1.1" depth="1.1" color="#8b2cff"></a-box>
    <a-box class="obstaculo" static-body position="1.3 11.0 -41.2" width="0.8" height="0.8" depth="0.8" color="#00cccc"></a-box>

    <!-- Lava pequeña para obligar a saltar un poco -->
    <a-box id="lava" static-body position="-4 0.15 -12" width="2.2" height="0.3" depth="2.2" color="#ff3300"></a-box>

    <!-- Texto de ayuda -->
    <a-text value="SALTA LOS BLOQUES" position="0 14 -46" align="center" color="#00ffcc" scale="3 3 3"></a-text>

    <!-- Meta -->
    <a-entity id="meta" static-body position="0 12.5 -50">
      <a-box width="12" height="0.5" depth="12" color="#00ffff" material="emissive: #00ffff; emissiveIntensity: 2"></a-box>
      <a-text value="META DEL NIVEL 2" align="center" position="0 4 0" scale="10 10 10" color="#00ffcc"></a-text>
      <a-light type="point" intensity="3" color="#00ffff" position="0 5 0"></a-light>
    </a-entity>

    <!-- Jugador -->
    <a-entity id="jugador" 
      position="0 3 0" 
      scale="1.5 1.5 1.5" 
      motor-gameplay 
      dynamic-body="mass: 2; fixedRotation: true">

        <!-- PERSONAJE PRINCIPAL: HULK -->
        <a-entity position="0 -0.95 0" rotation="0 180 0">

            <!-- Piernas más robustas -->
            <a-box position="-0.20 -0.95 0" depth="0.32" height="0.98" width="0.34" color="#1f4d1f"></a-box>
            <a-box position="0.20 -0.95 0" depth="0.32" height="0.98" width="0.34" color="#1f4d1f"></a-box>

            <!-- Pantalón morado -->
            <a-box position="0 -0.36 0" depth="0.52" height="0.50" width="0.90" color="#5b2a86"></a-box>

            <!-- Cadera / base del torso -->
            <a-cylinder position="0 0.18 0" radius="0.52" height="0.45" color="#2f8f2f" segments-radial="8"></a-cylinder>

            <!-- Torso más ancho -->
            <a-cylinder position="0 0.62 0" radius="0.58" height="0.92" color="#2f8f2f" segments-radial="8"></a-cylinder>

            <!-- Pecho / espalda -->
            <a-sphere position="0 0.88 0.02" radius="0.48" color="#2f8f2f"></a-sphere>

            <!-- Hombros grandes -->
            <a-sphere position="-0.42 0.82 0" radius="0.22" color="#2f8f2f"></a-sphere>
            <a-sphere position="0.42 0.82 0" radius="0.22" color="#2f8f2f"></a-sphere>

            <!-- Brazos pegados al cuerpo -->
            <a-box position="-0.56 0.50 0" depth="0.30" height="0.92" width="0.34" color="#2f8f2f" rotation="0 0 6"></a-box>
            <a-box position="0.56 0.50 0" depth="0.30" height="0.92" width="0.34" color="#2f8f2f" rotation="0 0 -6"></a-box>

            <!-- Antebrazos / bíceps -->
            <a-box position="-0.58 0.02 0.02" depth="0.32" height="0.72" width="0.36" color="#2f8f2f" rotation="0 0 2"></a-box>
            <a-box position="0.58 0.02 0.02" depth="0.32" height="0.72" width="0.36" color="#2f8f2f" rotation="0 0 -2"></a-box>

            <!-- Puños grandes -->
            <a-sphere position="-0.60 -0.42 0.02" radius="0.20" color="#1f4d1f"></a-sphere>
            <a-sphere position="0.60 -0.42 0.02" radius="0.20" color="#1f4d1f"></a-sphere>

            <!-- Cuello grueso -->
            <a-cylinder position="0 1.25 0" radius="0.20" height="0.18" color="#2f8f2f"></a-cylinder>

            <!-- Cabeza -->
            <a-sphere position="0 1.56 0" radius="0.40" color="#2f8f2f"></a-sphere>

            <!-- Cabello negro -->
            <a-sphere position="0 1.70 -0.03" radius="0.29" color="#111111"></a-sphere>

            <!-- Ojos -->
            <a-sphere position="-0.12 1.58 0.33" radius="0.035" color="#ffffff"></a-sphere>
            <a-sphere position="0.12 1.58 0.33" radius="0.035" color="#ffffff"></a-sphere>
            <a-sphere position="-0.12 1.58 0.36" radius="0.015" color="#000000"></a-sphere>
            <a-sphere position="0.12 1.58 0.36" radius="0.015" color="#000000"></a-sphere>

            <!-- Boca -->
            <a-box position="0 1.42 0.34" depth="0.02" height="0.03" width="0.20" color="#7a1f1f"></a-box>

        </a-entity>
    </a-entity>
<!-- Cámara -->
    <a-entity id="rig-camara" seguimiento-camara>
      <a-camera position="0 7 14" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
    </a-entity>
  </a-scene>
</body>
</html>
