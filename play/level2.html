<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Nivel 2 - JUEGO SENATIC</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Courier New', monospace; }
    .ui {
      position: absolute; top: 14px; left: 14px; z-index: 10;
      background: rgba(0, 10, 20, 0.85); color: #00ffcc; border: 2px solid #00ffcc;
      border-radius: 10px; padding: 14px 16px; font-size: 14px; display: none;
      box-shadow: 0 0 20px rgba(0,255,204,.25);
    }
    .overlay {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      z-index: 2000; color: #00ffcc; text-align: center;
      background: radial-gradient(circle, #0a1a2e 0%, #000 100%);
      border: 8px double #00ffcc; box-sizing: border-box;
    }
    .terminal-box {
      background: rgba(0, 20, 40, 0.95); padding: 42px 34px; border: 2px solid #00ffcc;
      box-shadow: 0 0 40px #00ffcc; border-radius: 20px; max-width: 520px;
    }
    input {
      background: #000; border: 1px solid #00ffcc; color: #00ffcc; padding: 14px;
      font-size: 20px; font-family: inherit; text-align: center; width: 320px;
      margin-top: 20px; outline: none; text-transform: uppercase; max-width: 90vw;
    }
    .btn-systec {
      margin-top: 24px; padding: 14px 40px; background: #00ffcc; color: #000; border: none;
      font-weight: bold; cursor: pointer; font-size: 18px;
      clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
      transition: 0.3s;
    }
    .btn-systec:hover { transform: translateY(-1px); }
    .controles-movil {
      position: absolute; bottom: 18px; width: 100%; display: none; justify-content: space-between;
      padding: 0 22px; box-sizing: border-box; z-index: 1000; pointer-events: none;
    }
    .d-pad { display: grid; grid-template-columns: repeat(3, 55px); gap: 5px; pointer-events: auto; }
    .d-btn, .btn-salto {
      width: 55px; height: 55px; background: rgba(0, 255, 204, 0.2); border: 2px solid #00ffcc;
      color: #00ffcc; display: flex; align-items: center; justify-content: center; border-radius: 10px;
      font-weight: bold; user-select: none; -webkit-user-select: none;
    }
    .btn-salto { width: 100px; height: 80px; font-size: 14px; pointer-events: auto; }
    #game-over-screen { display: none; }
  </style>

  <script>
    let nombrePiloto = "";
    let juegoIniciado = false;

    function iniciarMision() {
      const input = document.querySelector('#input-nombre');
      if (input.value.trim() === "") {
        alert("IDENTIFICACIÓN REQUERIDA");
        return;
      }

      nombrePiloto = input.value.toUpperCase();
      localStorage.setItem('nombrePiloto', nombrePiloto);
      document.querySelector('#user-display').innerText = nombrePiloto;
      document.querySelector('#pantalla-registro').style.display = "none";
      document.querySelector('#ui-top').style.display = "block";

      const sonido = document.querySelector('#audio-fondo');
      if (sonido && sonido.components && sonido.components.sound) {
        sonido.components.sound.playSound();
      }

      if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        document.querySelector('.controles-movil').style.display = "flex";
      }

      setTimeout(() => { juegoIniciado = true; }, 200);
    }

    function irAlIndex() {
      localStorage.removeItem('puntajeAcumulado');
      window.location.href = "index.html";
    }

    

    AFRAME.registerComponent('motor-gameplay', {
      init: function () {
        const puntajeGuardado = localStorage.getItem('puntajeAcumulado');
        this.puntos = puntajeGuardado ? parseInt(puntajeGuardado) : 0;
        this.puedeSaltar = true;
        this.vidas = 3;
        this.alturaMax = 0;
        this.invulnerable = false;
        this.keys = {};

        this.actualizarUI();
        window.addEventListener('keydown', (e) => { this.keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { this.keys[e.code] = false; });

        const bindTouch = (id, code) => {
          const el = document.querySelector(id);
          if (!el) return;
          el.addEventListener('touchstart', (e) => { e.preventDefault(); this.keys[code] = true; }, { passive: false });
          el.addEventListener('touchend', (e) => { e.preventDefault(); this.keys[code] = false; }, { passive: false });
        };

        bindTouch('#m-up', 'KeyW');
        bindTouch('#m-down', 'KeyS');
        bindTouch('#m-left', 'KeyA');
        bindTouch('#m-right', 'KeyD');
        bindTouch('#m-jump', 'Space');

        this.el.addEventListener('collide', (e) => {
          const target = e.detail.body.el;
          if (!target || !juegoIniciado) return;

          if (target.classList.contains('suelo')) {
            const yActual = Math.round(target.object3D.position.y);
            if (yActual > this.alturaMax) {
              this.puntos += 300;
              this.alturaMax = yActual;
              this.actualizarUI();
            }
          }

          if (target.id === 'lava' && !this.invulnerable) {
            this.perderVida();
          }

          if (target.id === 'meta') {
            this.puntos += 5000;
            if (navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 500]);
            localStorage.setItem('puntajeAcumulado', this.puntos);
            this.finalizarJuego("¡NIVEL COMPLETADO!");
            setTimeout(() => {
              window.location.href = "juego1.html";
            }, 2000);
          }
        });
      },

      perderVida: function () {
        this.invulnerable = true;
        this.vidas--;
        this.actualizarUI();

        if (this.vidas <= 0) {
          if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
          localStorage.removeItem('puntajeAcumulado');
          this.finalizarJuego("GAME OVER");
        } else {
          if (navigator.vibrate) navigator.vibrate(200);
          this.el.body.position.set(0, 3, 0);
          this.el.body.velocity.set(0, 0, 0);
          this.el.body.quaternion.set(0, 0, 0, 1);
          setTimeout(() => { this.invulnerable = false; }, 1000);
        }
      },

      actualizarUI: function () {
        const puntosVal = document.querySelector('#puntos-val');
        const vidasVal = document.querySelector('#vidas-val');
        if (puntosVal) puntosVal.innerText = this.puntos;
        if (vidasVal) vidasVal.innerText = "❤️".repeat(this.vidas > 0 ? this.vidas : 0);
      },

      finalizarJuego: function (titulo) {
        juegoIniciado = false;
        document.querySelector('#game-over-screen').style.display = "flex";
        const controles = document.querySelector('.controles-movil');
        if (controles) controles.style.display = "none";
        document.querySelector('#final-title').innerText = titulo;
        document.querySelector('#final-score').innerText = `${nombrePiloto}, PUNTUACIÓN: ${this.puntos}`;
      },

      tick: function () {
        if (!this.el.body || !juegoIniciado) return;

        this.el.body.quaternion.set(0, 0, 0, 1);
        this.el.body.angularVelocity.set(0, 0, 0);
        const v = this.el.body.velocity;
        const f = 8;

        if (this.keys['KeyW']) v.z = -f; else if (this.keys['KeyS']) v.z = f; else v.z = 0;
        if (this.keys['KeyA']) v.x = -f; else if (this.keys['KeyD']) v.x = f; else v.x = 0;

        if (this.keys['Space']) {
          if (Math.abs(v.y) < 0.1 && this.puedeSaltar) {
            v.y = 13;
            this.puedeSaltar = false;
          }
        } else {
          this.puedeSaltar = true;
        }
      }
    });

    AFRAME.registerComponent('seguimiento-camara', {
      init: function () {
        this.objetivo = document.querySelector('#jugador');
        this.keys = {};
        window.addEventListener('keydown', (e) => { this.keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { this.keys[e.code] = false; });
        this.currentRotation = { x: -20, y: 0, z: 0 };
      },
      tick: function () {
        if (!this.objetivo || !juegoIniciado) return;
        this.el.object3D.position.lerp(this.objetivo.object3D.position, 0.1);
        if (this.keys['ArrowLeft']) this.currentRotation.y += 2.0;
        if (this.keys['ArrowRight']) this.currentRotation.y -= 2.0;
        if (this.keys['ArrowUp']) this.currentRotation.x -= 1.0;
        if (this.keys['ArrowDown']) this.currentRotation.x += 1.0;
        this.currentRotation.x = Math.max(-60, Math.min(20, this.currentRotation.x));
        this.el.setAttribute('rotation', `${this.currentRotation.x} ${this.currentRotation.y} ${this.currentRotation.z}`);
      }
    });
  </script>
</head>
<body>
  <div class="controles-movil">
    <div class="d-pad">
      <div></div><div id="m-up" class="d-btn">▲</div><div></div>
      <div id="m-left" class="d-btn">◀</div><div id="m-down" class="d-btn">▼</div><div id="m-right" class="d-btn">▶</div>
    </div>
    <div id="m-jump" class="btn-salto">SALTO</div>
  </div>

  <div id="pantalla-registro" class="overlay">
    <div class="terminal-box">
      <h1 style="letter-spacing: 12px; margin: 0;">NIVEL 2</h1>
      <p style="margin-top: 14px; color: #d9fff8;">Mapa de precisión: saltos cortos, bloques castigo y meta elevada.</p>
      <input type="text" id="input-nombre" placeholder="ID DEL PILOTO" maxlength="12" autocomplete="off" />
      <br />
      <button class="btn-systec" onclick="iniciarMision()">ESTABLECER ENLACE</button>
      <br />
      <button onclick="irAlIndex()" style="margin-top: 20px; background: rgba(0,255,204,0.1); border: 1px solid #00ffcc; color: #00ffcc; cursor: pointer; font-family: inherit; font-size: 14px; padding: 12px; width: 100%; position: relative; z-index: 5000;">
        ⬅ VOLVER AL PORTAL SYSTEC
      </button>
    </div>
  </div>

  <div id="ui-top" class="ui">
    ID: <span id="user-display">---</span><br>
    PTS: <span id="puntos-val">0</span><br>
    <div id="vidas-val">❤️❤️❤️</div>
  </div>

  <div id="game-over-screen" class="overlay" style="display: none;">
    <div class="terminal-box">
      <h1 id="final-title">TERMINADO</h1>
      <p id="final-score"></p>
      <button class="btn-systec" onclick="location.reload()">REINTENTAR MISIÓN</button>
    </div>
  </div>

  <a-scene physics="gravity: -18; friction: 0.01;">
    <a-assets>
      <img id="textura-cielo" src="img/wakanda.png" />
      <audio id="musica-fondo" src="img/videos/intergalactic.mp3" preload="auto"></audio>
    </a-assets>

    <a-sound id="audio-fondo" src="#musica-fondo" loop="true" volume="0.20"></a-sound>

    <a-sphere id="sky-dome" radius="150" material="src: #textura-cielo; shader: flat; side: back" rotation="0 -90 0"></a-sphere>
    <a-stars radius="120" count="8000" color="#00ffcc"></a-stars>
    <a-light type="ambient" intensity="0.4"></a-light>
    

    <!-- MAPA NIVEL 2: dificultad media con saltos técnicos y colisiones limpias -->
    <a-box class="suelo" static-body position="0 0 0" width="10" height="0.4" depth="10" color="#222"></a-box>

    <!-- Ruta 1: salida del inicio -->
    <a-box class="suelo" static-body position="0 2.8 -6" width="3.4" height="0.35" depth="3.4" color="#3a3a3a"></a-box>
    <a-box class="suelo" static-body position="4 5.6 -11" width="2.4" height="0.35" depth="2.4" color="#444"></a-box>
    <a-box class="suelo" static-body position="-3 8.4 -16" width="2.1" height="0.35" depth="2.1" color="#555"></a-box>
    <a-box class="suelo" static-body position="3 11.2 -21" width="1.9" height="0.35" depth="1.9" color="#666"></a-box>

    <!-- Tramo de precisión: plataforma angosta -->
    <a-box class="suelo" static-body position="-2 14.0 -26" width="1.4" height="0.25" depth="1.4" color="#777"></a-box>
    <a-box class="suelo" static-body position="2 16.8 -31" width="1.3" height="0.25" depth="1.3" color="#888"></a-box>

    <!-- Puente central: obliga a calcular el salto -->
    <a-box class="suelo" static-body position="0 19.6 -36" width="5.2" height="0.25" depth="1.1" color="#4b0082"></a-box>

    <!-- Cambio de lado -->
    <a-box class="suelo" static-body position="4 22.2 -41" width="1.4" height="0.25" depth="1.4" color="#999"></a-box>
    <a-box class="suelo" static-body position="-4 24.8 -46" width="1.4" height="0.25" depth="1.4" color="#aaa"></a-box>
    <a-box class="suelo" static-body position="0 27.4 -51" width="1.2" height="0.25" depth="1.2" color="#bbb"></a-box>

    <!-- Último tramo: un poco más alto pero con aterrizaje seguro -->
    <a-box class="suelo" static-body position="3 30.0 -56" width="1.2" height="0.25" depth="1.2" color="#8c8c8c"></a-box>
    <a-box class="suelo" static-body position="-2 32.6 -61" width="1.2" height="0.25" depth="1.2" color="#9b9b9b"></a-box>
    <a-box class="suelo" static-body position="0 35.0 -66" width="6" height="0.4" depth="6" color="#00a38a"></a-box>

    <!-- Bloques rojos visibles como castigo visual; si quieres que todos reinicien, conviene usar class en el script -->
    <a-box static-body position="1.6 22.1 -41" width="0.8" height="0.8" depth="0.8"
           material="color: #ff0033; emissive: #ff0033; emissiveIntensity: 2"></a-box>
    <a-box static-body position="-1.6 24.7 -46" width="0.8" height="0.8" depth="0.8"
           material="color: #ff0033; emissive: #ff0033; emissiveIntensity: 2"></a-box>
    <a-box static-body position="0.9 30.0 -56" width="0.8" height="0.8" depth="0.8"
           material="color: #ff0033; emissive: #ff0033; emissiveIntensity: 2"></a-box>

    <!-- Meta -->
    <a-entity id="meta" static-body position="0 38 -72">
      <a-box width="10" height="0.5" depth="10" color="#00ffff" material="emissive: #00ffff; emissiveIntensity: 2"></a-box>
      <a-text value="CORE ALCANZADO" align="center" position="0 3 0" scale="6 6 6" color="#ffffff"></a-text>
      <a-light type="point" intensity="3" color="#00ffff" position="0 4 0"></a-light>
    </a-entity>

    <!-- Decoración para que el nivel se vea más vivo -->
    <a-box position="7 4 -9" width="0.5" height="8" depth="0.5" color="#00ffcc" opacity="0.35"></a-box>
    <a-box position="-7 12 -22" width="0.5" height="10" depth="0.5" color="#ff00cc" opacity="0.30"></a-box>
    <a-box position="7 22 -40" width="0.5" height="10" depth="0.5" color="#00aaff" opacity="0.30"></a-box>
    <a-text value="SALTOS DE PRECISION" position="0 14 -18" align="center" color="#00ffcc" scale="3 3 3"></a-text>

    <!-- Jugador -->
    <a-entity id="jugador" position="0 3 0" scale="1.5 1.5 1.5" motor-gameplay dynamic-body="mass: 2; fixedRotation: true">
      <a-cylinder position="0 1.2 0" radius="0.22" height="0.38" color="#ffe0bd">
        <a-sphere position="-0.1 0.1 -0.21" radius="0.03" color="black"></a-sphere>
        <a-sphere position="0.1 0.1 -0.21" radius="0.03" color="black"></a-sphere>
        <a-cylinder position="0 0.28 0" radius="0.26" height="0.12" color="#556b2f"></a-cylinder>
        <a-box position="0 0.25 -0.28" width="0.45" height="0.04" depth="0.3" color="#556b2f" rotation="10 0 0"></a-box>
      </a-cylinder>
      <a-box position="0 0.6 0" width="0.7" height="0.75" depth="0.45" color="#8b4513">
        <a-box position="0 0 0.02" width="0.72" height="0.77" depth="0.45" color="#556b2f" opacity="0.8"></a-box>
      </a-box>
      <a-box position="-0.5 0.6 0" width="0.28" height="0.7" depth="0.28" color="#ffe0bd" animation="property: rotation; from: -20 0 0; to: 20 0 0; dur: 800; dir: alternate; loop: true"></a-box>
      <a-box position="0.5 0.6 0" width="0.28" height="0.7" depth="0.28" color="#ffe0bd" animation="property: rotation; from: 20 0 0; to: -20 0 0; dur: 800; dir: alternate; loop: true"></a-box>
      <a-box position="-0.2 -0.1 0" width="0.32" height="0.65" depth="0.32" color="#3b2f2f"></a-box>
      <a-box position="0.2 -0.1 0" width="0.32" height="0.65" depth="0.32" color="#3b2f2f"></a-box>
    </a-entity>

    <!-- Cámara -->
    <a-entity id="rig-camara" seguimiento-camara>
      <a-camera position="0 7 14" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
    </a-entity>

  </a-scene>
</body>
</html>
